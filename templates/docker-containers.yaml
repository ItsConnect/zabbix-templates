zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 846977d1dfed4968bc5f8bdb363285bc
      name: 'Templates/ITS Connect'
  templates:
    - uuid: a1b2c3d4e5f6a1b2c3d4e5f6a1b20002
      template: 'ITS Connect - Docker Containers'
      name: 'ITS Connect - Docker Containers'
      description: |
        Discovers and monitors Docker containers using Zabbix Agent 2
        native Docker plugin. Tracks container status, CPU, memory and
        container inventory.
        Requires Zabbix Agent 2 with Docker plugin enabled.
        Maintained by ITS Connect - https://itsconnect.com.br
      groups:
        - name: 'Templates/ITS Connect'
      items:
        - uuid: b2000000000000000000000000000001
          name: 'Docker: Running containers'
          type: ZABBIX_ACTIVE
          key: 'docker.containers.running'
          delay: '60'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Total number of Docker containers in running state.'
          tags:
            - tag: component
              value: docker
        - uuid: b2000000000000000000000000000002
          name: 'Docker: Total containers'
          type: ZABBIX_ACTIVE
          key: 'docker.containers.total'
          delay: '60'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Total number of Docker containers in any state.'
          tags:
            - tag: component
              value: docker
        - uuid: b2000000000000000000000000000003
          name: 'Docker: Total images'
          type: ZABBIX_ACTIVE
          key: 'docker.images.total'
          delay: '3600'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Total number of Docker images on the host.'
          tags:
            - tag: component
              value: docker
        - uuid: b2000000000000000000000000000004
          name: 'Docker: Engine status'
          type: ZABBIX_ACTIVE
          key: 'docker.ping'
          delay: '30'
          history: 7d
          trends: 365d
          value_type: UNSIGNED
          description: 'Returns 1 if Docker daemon is responding, 0 otherwise.'
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: docker
        - uuid: b2000000000000000000000000000005
          name: 'Docker: Data space used'
          type: ZABBIX_ACTIVE
          key: 'docker.data_space.used'
          delay: '300'
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: B
          description: 'Disk space used by Docker data.'
          tags:
            - tag: component
              value: docker
      discovery_rules:
        - uuid: d2000000000000000000000000000001
          name: 'Docker: Container discovery'
          type: ZABBIX_ACTIVE
          key: 'docker.containers.discovery'
          delay: '300'
          lifetime: 7d
          description: 'Discovers all Docker containers on the host.'
          item_prototypes:
            - uuid: e2000000000000000000000000000001
              name: 'Container [{#NAME}]: Status'
              type: ZABBIX_ACTIVE
              key: 'docker.container.info[{#NAME},State.Status]'
              delay: '30'
              history: 7d
              trends: '0'
              value_type: CHAR
              description: 'Current state of the container (running, exited, etc.).'
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000002
              name: 'Container [{#NAME}]: CPU usage'
              type: ZABBIX_ACTIVE
              key: 'docker.container.stats[{#NAME},cpu.percent]'
              delay: '60'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              description: 'CPU utilization percentage for the container.'
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000003
              name: 'Container [{#NAME}]: Memory usage'
              type: ZABBIX_ACTIVE
              key: 'docker.container.stats[{#NAME},memory.usage]'
              delay: '60'
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              description: 'Memory usage of the container in bytes.'
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000004
              name: 'Container [{#NAME}]: Memory limit'
              type: ZABBIX_ACTIVE
              key: 'docker.container.stats[{#NAME},memory.limit]'
              delay: '3600'
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              description: 'Memory limit assigned to the container.'
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000005
              name: 'Container [{#NAME}]: Memory utilization'
              type: CALCULATED
              key: 'docker.container.memory.pused[{#NAME}]'
              delay: '60'
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              params: '100*last(//docker.container.stats[{#NAME},memory.usage])/last(//docker.container.stats[{#NAME},memory.limit])'
              description: 'Memory usage as a percentage of the container limit.'
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000006
              name: 'Container [{#NAME}]: Network received'
              type: ZABBIX_ACTIVE
              key: 'docker.container.stats[{#NAME},network.rx_bytes]'
              delay: '60'
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: Bps
              description: 'Network bytes received by the container.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
            - uuid: e2000000000000000000000000000007
              name: 'Container [{#NAME}]: Network sent'
              type: ZABBIX_ACTIVE
              key: 'docker.container.stats[{#NAME},network.tx_bytes]'
              delay: '60'
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: Bps
              description: 'Network bytes sent by the container.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: docker
                - tag: container
                  value: '{#NAME}'
          trigger_prototypes:
            - uuid: f2000000000000000000000000000001
              expression: 'last(/ITS Connect - Docker Containers/docker.container.info[{#NAME},State.Status])<>"running"'
              name: 'Container [{#NAME}] is not running'
              priority: HIGH
              description: 'The container {#NAME} is not in a running state.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: availability
                - tag: container
                  value: '{#NAME}'
            - uuid: f2000000000000000000000000000002
              expression: 'min(/ITS Connect - Docker Containers/docker.container.memory.pused[{#NAME}],5m)>90'
              name: 'Container [{#NAME}]: High memory usage (>{ITEM.VALUE}%)'
              priority: AVERAGE
              description: 'Container {#NAME} memory usage has exceeded 90% of its limit for 5 minutes.'
              tags:
                - tag: scope
                  value: performance
                - tag: container
                  value: '{#NAME}'
            - uuid: f2000000000000000000000000000003
              expression: 'min(/ITS Connect - Docker Containers/docker.container.stats[{#NAME},cpu.percent],5m)>80'
              name: 'Container [{#NAME}]: High CPU usage (>{ITEM.VALUE}%)'
              priority: AVERAGE
              description: 'Container {#NAME} CPU usage has exceeded 80% for 5 minutes.'
              tags:
                - tag: scope
                  value: performance
                - tag: container
                  value: '{#NAME}'
      triggers:
        - uuid: c2000000000000000000000000000001
          expression: 'last(/ITS Connect - Docker Containers/docker.ping)=0'
          name: 'Docker engine is down'
          priority: DISASTER
          description: 'The Docker daemon is not responding.'
          tags:
            - tag: scope
              value: availability
      valuemaps:
        - uuid: v2000000000000000000000000000001
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
      tags:
        - tag: class
          value: containers
        - tag: target
          value: docker
